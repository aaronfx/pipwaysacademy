<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}Pipways{% endblock %}</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

</head>

<body class="bg-slate-950 text-slate-200">

<div class="flex h-screen">

<!-- Sidebar -->
<aside class="w-64 bg-slate-900 border-r border-slate-800">

<div class="p-6 text-xl font-bold text-white">
Pipways
</div>

<nav class="space-y-1 px-4">

<a href="/dashboard" class="block py-2 text-slate-300 hover:text-blue-400">
Dashboard
</a>

<a href="/journal" class="block py-2 text-slate-300 hover:text-blue-400">
Trade Journal
</a>

<a href="/analysis" class="block py-2 text-slate-300 hover:text-blue-400">
Chart Analysis
</a>

<a href="/mentor" class="block py-2 text-slate-300 hover:text-blue-400">
AI Mentor
</a>

<a href="/blog" class="block py-2 text-slate-300 hover:text-blue-400">
Blog
</a>

</nav>

</aside>


<!-- Main -->
<main class="flex-1 p-8 overflow-y-auto">

{% block content %}{% endblock %}

</main>

</div>

</body>
</html>
